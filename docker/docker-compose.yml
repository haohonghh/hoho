services:
  hoho-nacos:
    container_name: hoho-nacos
    image: nacos/nacos-server:v3.0.2-fixed
    build:
      context: ./nacos
      dockerfile: dockerfile
    platform: linux/amd64
    pull_policy: if_not_present
    environment:
      - MODE=standalone
      - NACOS_AUTH_TOKEN=your_auth_token
      - NACOS_AUTH_IDENTITY_KEY=your_identity_key
      - NACOS_AUTH_IDENTITY_VALUE=your_identity_value
    volumes:
      - ./nacos/logs/:/home/nacos/logs
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
      - "18080:8080"
    depends_on:
      hoho-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8848/nacos/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
  hoho-mysql:
    container_name: hoho-mysql
    image: mysql:8.0
    build:
      context: ./mysql
      dockerfile: dockerfile
    platform: linux/amd64
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/conf:/etc/mysql/conf.d
      - ./mysql/logs:/logs
      - ./mysql/data:/var/lib/mysql
      - ./mysql/db:/docker-entrypoint-initdb.d
    command: [
          'mysqld',
          '--innodb-buffer-pool-size=80M',
          '--character-set-server=utf8mb4',
          '--collation-server=utf8mb4_unicode_ci',
          '--default-time-zone=+8:00',
          '--lower-case-table-names=1',
          '--default-authentication-plugin=mysql_native_password'
        ]
    environment:
      MYSQL_DATABASE: 'ry-config'
      MYSQL_ROOT_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
  hoho-redis:
    container_name: hoho-redis
    image: redis
    build:
      context: ./redis
      dockerfile: dockerfile
    platform: linux/amd64
    ports:
      - "6379:6379"
    volumes:
      - ./redis/conf/redis.conf:/redis/redis.conf
      - ./redis/data:/data
    command: redis-server /redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
  hoho-nginx:
    container_name: hoho-nginx
    image: nginx
    build:
      context: ./nginx
      dockerfile: dockerfile
    platform: linux/amd64
    ports:
      - "80:80"
    volumes:
      - ./nginx/html/dist:/nginx/html
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/logs:/var/log/nginx
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      hoho-gateway:
        condition: service_started
    links:
      - hoho-gateway
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -fsS http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
  hoho-gateway:
    container_name: hoho-gateway
    build:
      context: ./hoho/gateway
      dockerfile: dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - hoho-redis
    links:
      - hoho-redis
  hoho-auth:
    container_name: hoho-auth
    build:
      context: ./hoho/auth
      dockerfile: dockerfile
    ports:
      - "9200:9200"
    depends_on:
      - hoho-redis
    links:
      - hoho-redis
  hoho-modules-system:
    container_name: hoho-modules-system
    build:
      context: ./hoho/modules/system
      dockerfile: dockerfile
    ports:
      - "9201:9201"
    depends_on:
      - hoho-redis
      - hoho-mysql
    links:
      - hoho-redis
      - hoho-mysql
  hoho-modules-gen:
    container_name: hoho-modules-gen
    build:
      context: ./hoho/modules/gen
      dockerfile: dockerfile
    ports:
      - "9202:9202"
    depends_on:
      - hoho-mysql
    links:
      - hoho-mysql
  hoho-modules-job:
    container_name: hoho-modules-job
    build:
      context: ./hoho/modules/job
      dockerfile: dockerfile
    ports:
      - "9203:9203"
    depends_on:
      - hoho-mysql
    links:
      - hoho-mysql
  hoho-modules-file:
    container_name: hoho-modules-file
    build:
      context: ./hoho/modules/file
      dockerfile: dockerfile
    ports:
      - "9300:9300"
    volumes:
    - ./hoho/uploadPath:/uploadPath
  hoho-visual-monitor:
    container_name: hoho-visual-monitor
    build:
      context: ./hoho/visual/monitor
      dockerfile: dockerfile
    ports:
      - "9100:9100"
