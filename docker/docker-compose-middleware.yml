services:
  hoho-nacos:
    container_name: hoho-nacos
    image: nacos/nacos-server:v3.0.2-fixed
    build:
      context: ./nacos
      dockerfile: dockerfile
    platform: linux/amd64
    pull_policy: if_not_present
    environment:
      - MODE=standalone
      - NACOS_AUTH_TOKEN=your_auth_token
      - NACOS_AUTH_IDENTITY_KEY=your_identity_key
      - NACOS_AUTH_IDENTITY_VALUE=your_identity_value
    volumes:
      - ./nacos/logs/:/home/nacos/logs
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    ports:
      - "8080:8080"
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    depends_on:
      hoho-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8848/nacos/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
    restart: unless-stopped

  hoho-mysql:
    container_name: hoho-mysql
    image: mysql:8.0
    platform: linux/amd64
    pull_policy: if_not_present
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/conf:/etc/mysql/conf.d
      - ./mysql/logs:/logs
      - ./mysql/data:/var/lib/mysql
    command: [
          'mysqld',
          '--innodb-buffer-pool-size=80M',
          '--character-set-server=utf8mb4',
          '--collation-server=utf8mb4_unicode_ci',
          '--default-time-zone=+8:00',
          '--lower-case-table-names=1',
          '--default-authentication-plugin=mysql_native_password'
        ]
    environment:
      MYSQL_DATABASE: 'ry-config'
      MYSQL_ROOT_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  hoho-redis:
    container_name: hoho-redis
    image: redis:latest
    platform: linux/amd64
    pull_policy: if_not_present
    ports:
      - "6379:6379"
    volumes:
      - ./redis/conf/redis.conf:/redis/redis.conf
      - ./redis/data:/data
    command: redis-server /redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  hoho-nginx:
    container_name: hoho-nginx
    image: nginx:latest
    platform: linux/amd64
    pull_policy: if_not_present
    ports:
      - "80:80"
    volumes:
      - ./nginx/html/dist:/nginx/html
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/logs:/var/log/nginx
      - ./nginx/conf.d:/etc/nginx/conf.d
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -fsS http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
