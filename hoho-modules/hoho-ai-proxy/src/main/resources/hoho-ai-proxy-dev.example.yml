# Copy this file content to Nacos:
# Data ID: hoho-ai-proxy-dev.yml
# Group: DEFAULT_GROUP

spring:
  datasource:
    druid:
      stat-view-servlet:
        enabled: true
        loginUsername: hoho
        loginPassword: 123456
    dynamic:
      druid:
        initial-size: 5
        min-idle: 2
        maxActive: 10
        maxWait: 60000
        connectTimeout: 30000
        socketTimeout: 60000
        timeBetweenEvictionRunsMillis: 60000
        minEvictableIdleTimeMillis: 300000
        validationQuery: SELECT 1
        testWhileIdle: true
        testOnBorrow: false
        testOnReturn: false
      datasource:
        master:
          driver-class-name: org.postgresql.Driver
          url: jdbc:postgresql://localhost:5432/hoho_kb
          username: postgres
          password: postgres
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10s
  ai:
    model:
      chat: dashscope
      embedding: ollama
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        enabled: true
        options:
          model: qwen-plus
      embedding:
        enabled: false
    ollama:
      base-url: http://localhost:11434
      embedding:
        model: embeddinggemma
        options:
          model: embeddinggemma

hoho:
  ai:
    chat:
      default-system-prompt: 你是企业IT运维智能客服助手，回答要准确、简洁、可执行。
    embedding:
      dimension: 768
      batch-size: 16
    memory:
      max-messages: 6
      ttl-minutes: 120
      key-prefix: "hoho:ai:memory:"
      summary-trigger-message-count: 8
      summary-keep-recent-messages: 2

mybatis:
  typeAliasesPackage: com.hoho.ai.domain
  mapperLocations: classpath:mapper/**/*.xml
